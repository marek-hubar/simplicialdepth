# R CMD check - Cross-platform CI/CD for simplicialdepth
# 
# This workflow runs on every push and pull request to ensure the package
# builds correctly on Windows, macOS, and Linux with multiple R versions.
#
# Platforms tested:
#   - Windows Server 2022 (latest R + R-devel)
#   - macOS 12 / 13 (latest R)
#   - Ubuntu 22.04 LTS (latest R + R-devel)
#
# Tests performed:
#   - R CMD check (full package validation)
#   - Full test suite (testthat)
#   - Build verification with optimization flags
#   - Artifact upload for failed checks

name: R-CMD-check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly check on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} - R ${{ matrix.r }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows - latest R
          - os: windows-latest
            r: 'release'
            compiler-flags: '-O3'
            
          # macOS - latest R
          - os: macos-latest
            r: 'release'
            compiler-flags: '-O3'
            
          # Ubuntu - latest R and R-devel
          - os: ubuntu-latest
            r: 'release'
            compiler-flags: '-O3'
            
          - os: ubuntu-latest
            r: 'devel'
            compiler-flags: '-O3'
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::devtools
            any::RcppParallel

      - name: Session info
        run: |
          options(width = 100)
          pkgs <- installed.packages()[, "Package"]
          sessioninfo::session_info(pkgs, dependencies = FALSE)
        shell: Rscript {0}

      - name: Check
        run: rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "warning", check_dir = "check")
        shell: Rscript {0}

      - name: Run tests
        run: devtools::test()
        shell: Rscript {0}

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.os }}-r${{ matrix.r }}-check
          path: check

  # Summary job - passes if all checks pass
  check-summary:
    runs-on: ubuntu-latest
    needs: R-CMD-check
    if: always()
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.R-CMD-check.result }}" != "success" ]; then
            echo "R-CMD-check failed on one or more platforms"
            exit 1
          fi
          echo "All R-CMD-check jobs passed successfully"
